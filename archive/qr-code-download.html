<!DOCTYPE html>
<html lang="en" class="bg-canvas">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Product Literature | PWI, Inc.</title>
    <meta name="description" content="Download PWI product literature, data sheets, and product files."/>
    <meta name="robots" content="noindex"/>
    <link rel="canonical" href="https://pwi-e.com/qr-code-download/"/>
    <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png"/>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png"/>
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png"/>
    <link rel="manifest" href="favicon_io/site.webmanifest"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="tailwind_theme/tailwind.min.css?v=20260622" rel="stylesheet" type="text/css"/>
    <link href="tailwind_theme/overrides.css?v=20260622" rel="stylesheet"/>
    <style>
      :root {
        --font-sans: "Rubik", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        --brand: #1e4ed8;
        --brand-hover: #1b46c4;
        --ink: #0f172a;
        --body: #1f2937;
        --muted: #475569;
        --line: #cbd5e1;
        --surface: #ffffff;
        --surface-soft: #f1f5f9;
        --canvas: #f6f7f9;
      }
      body {
        font-family: var(--font-sans);
        background: var(--canvas);
        color: var(--body);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .bg-canvas  { background: var(--canvas)  !important; }
      .bg-surface { background: var(--surface) !important; }
      .bg-surface-soft { background: var(--surface-soft) !important; }
      .text-ink   { color: var(--ink)   !important; }
      .text-body  { color: var(--body)  !important; }
      .text-muted { color: var(--muted) !important; }
      .border-line { border-color: var(--line) !important; }
      .btn-primary  { background: var(--brand); border-color: var(--brand); color: #fff; }
      .btn-primary:hover  { background: var(--brand-hover); border-color: var(--brand-hover); }
      .btn-secondary { background: var(--surface); border-color: var(--line); color: var(--body); }
      .btn-secondary:hover { border-color: var(--brand); color: var(--brand); }
      .hero-dark {
        background:
          radial-gradient(1000px 420px at 85% 10%, rgba(30, 78, 216, 0.18), transparent 56%),
          linear-gradient(180deg, #0d1e40 0%, #0f2244 52%, #0b1a38 100%);
        color: #e2e8f0;
      }


      /* ── Directory grid ─────────────────────────────────── */
      .qr-dir-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1.25rem;
      }
      @media (max-width: 1199px) {
        .qr-dir-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      @media (max-width: 899px) {
        .qr-dir-grid { grid-template-columns: 1fr; }
      }
      @media (max-width: 599px) {
        .qr-dir-grid { grid-template-columns: 1fr; }
      }

      .qr-card {
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--surface);
        box-shadow: 0 4px 16px rgba(15,23,42,0.06);
        overflow: hidden;
        transition: box-shadow 0.18s, transform 0.18s;
      }
      .qr-card:hover {
        box-shadow: 0 10px 32px rgba(15,23,42,0.13);
        transform: translateY(-2px);
      }
      .qr-card-top {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 128px;
        gap: 0;
        align-items: stretch;
      }
      .qr-card-photo {
        position: relative;
        height: 184px;
        background: linear-gradient(135deg, #d8e4f5 0%, #b8cadf 100%);
        overflow: hidden;
      }
      .qr-card-photo .product-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        transform: scale(1.14);
        transform-origin: center;
        display: block;
      }
      .qr-card-photo .product-img.crop-green-backlight {
        object-position: 72% 42%;
        transform: scale(1.24);
      }
      .qr-card-photo .product-img.crop-dimming-control {
        object-position: center 38%;
        transform: scale(1.3);
      }
      .qr-card-photo .product-img.crop-step-light {
        object-position: center 42%;
        transform: scale(1.34);
      }
      .qr-card-photo .product-img.crop-303-right-angle {
        object-position: 42% 50%;
        transform: scale(1.18);
      }
      .qr-card-photo .product-img.crop-coil-winding {
        object-position: center 54%;
        transform: scale(1.12);
      }
      .qr-badge {
        width: 96px;
        height: 96px;
        background: #fff;
        border-radius: 10px;
        padding: 5px;
        box-shadow: 0 4px 14px rgba(15,23,42,0.10);
        border: 1px solid rgba(30,78,216,0.18);
        display: block;
      }
      .qr-badge img {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: 7px;
        object-fit: contain;
      }
      .qr-card-qrcol {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.45rem;
        padding: 0.9rem 0.8rem;
        border-left: 1px solid rgba(30,78,216,0.12);
      }
      .qr-card-titlebar {
        position: absolute;
        inset: 0 auto auto 0;
        right: 0;
        background: linear-gradient(180deg, rgba(13,30,64,0.94) 0%, rgba(11,26,56,0.90) 100%);
        padding: 0.55rem 0.8rem 0.5rem;
      }
      .qr-card-meta {
        display: contents;
      }
      .qr-card-meta-copy {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #93C5FD;
        line-height: 1.2;
        margin: 0;
        text-align: center;
      }
      .qr-card-name {
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        line-height: 1.08;
        margin: 0;
        text-transform: uppercase;
        text-align: center;
        text-shadow: 0 1px 2px rgba(15,23,42,0.3);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      /* ── Detail view ────────────────────────────────────── */
      .qr-detail-wrap { max-width: 660px; margin: 0 auto; }
      .qr-detail-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: 0 8px 28px rgba(15,23,42,0.09);
        overflow: hidden;
      }
      .qr-detail-photo {
        height: 220px;
        background: linear-gradient(135deg, #d8e4f5 0%, #b8cadf 100%);
        overflow: hidden;
      }
      .qr-detail-photo img {
        width: 100%; height: 100%; object-fit: cover; display: block;
      }
      .qr-detail-body { padding: 2rem 2rem 1.75rem; }
      @media (max-width: 599px) {
        .qr-detail-body { padding: 1.5rem 1.25rem 1.5rem; }
        .qr-detail-divider { margin-left: -1.25rem !important; margin-right: -1.25rem !important; }
      }
      .qr-detail-kicker {
        display: inline-flex;
        align-items: center;
        border-radius: 9999px;
        border: 1px solid #dbe5ff;
        background: #eef2ff;
        color: #1e4ed8;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        padding: 0.3rem 0.75rem;
        margin-bottom: 0.75rem;
      }
      .qr-detail-title {
        font-size: clamp(1.45rem, 5vw, 2rem);
        font-weight: 600;
        color: var(--ink);
        line-height: 1.22;
        margin-bottom: 0.65rem;
      }
      .qr-detail-desc {
        font-size: 15px;
        color: var(--muted);
        line-height: 1.65;
        max-width: 52ch;
        margin-bottom: 1.75rem;
      }
      .qr-detail-divider {
        border: 0;
        border-top: 1px solid var(--line);
        margin: 0 -2rem;
      }
      .qr-detail-qr {
        padding-top: 1.75rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.55rem;
        padding-bottom: 0.25rem;
      }
      .qr-detail-qr-frame {
        width: 196px;
        height: 196px;
        border-radius: 18px;
        border: 1px solid var(--line);
        padding: 6px;
        background: #fff;
        box-shadow: 0 6px 22px rgba(15,23,42,0.1);
      }
      .qr-detail-qr-frame img {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: 12px;
        object-fit: contain;
      }
      .qr-detail-qr-hint {
        font-size: 11px;
        color: var(--muted);
        text-align: center;
        line-height: 1.45;
      }
      .qr-detail-landing-url {
        font-size: 11px;
        color: var(--brand);
        word-break: break-all;
        text-align: center;
        text-decoration: none;
        padding-bottom: 0.25rem;
      }
      .qr-detail-landing-url:hover { text-decoration: underline; }
      .qr-back-link {
        display: block;
        text-align: center;
        margin-top: 1rem;
        font-size: 12px;
        color: var(--muted);
        text-decoration: none;
      }
      .qr-back-link:hover { color: var(--brand); text-decoration: underline; }

      /* ── Not found ──────────────────────────────────────── */
      .qr-notfound { max-width: 520px; margin: 0 auto; }
    </style>
  </head>
  <body class="bg-canvas text-body">
    <div data-site-nav-slot></div>
    <div class="h-16"></div>
    <main id="main-content">

      <section class="relative overflow-hidden hero-dark pb-0">
        <div class="max-w-7xl mx-auto px-6 lg:pb-8" style="padding-top:8rem">
          <p class="mb-4 font-sans text-[11px] uppercase tracking-[0.18em] text-[#93C5FD]">Product Downloads</p>
          <h1 class="font-sans text-[clamp(2.55rem,10.5vw,3.75rem)] font-light uppercase leading-[1.05] md:leading-[1.09] tracking-[-0.015em] sm:tracking-[-0.02em] text-white" style="text-wrap:balance;">Product <span class="block mt-2 text-slate-300">Literature</span></h1>
          <p class="mt-5 text-base sm:text-lg text-slate-300 leading-relaxed max-w-2xl">Click any product to download its data sheet.</p>
        </div>
      </section>

      <section class="pt-8" style="padding-bottom: 8rem;">
        <div class="max-w-7xl mx-auto px-6">
          <div id="qr-content">
            <p class="text-sm text-muted">Loading QR data…</p>
          </div>
        </div>
      </section>

    </main>
    <div data-site-footer-slot></div>

    <script src="tailwind_theme/qr-data.js?v=20260622"></script>
    <script>
      (function () {
        var params  = new URLSearchParams(window.location.search);
        var slug    = params.get("item") || "";
        var data    = (window.PWI_QR_DATA || {})[slug];
        var mount   = document.getElementById("qr-content");

        function qrImgUrl(landingUrl) {
          return 'https://quickchart.io/qr?text=' + encodeURIComponent(landingUrl) + '&size=220&margin=1&ecLevel=M';
        }

        function getPdfPagePath(item) {
          var pdfPageBySlug = {
            "1308-1309-reading-light": "pwi-led-replacement-reading-lights-pdf.html",
            "1495-reading-light": "pwi-led-replacement-reading-lights-pdf.html",
            "303-reading-light": "pwi-led-replacement-reading-lights-pdf.html",
            "303-right-angle-reading-light": "pwi-led-replacement-reading-lights-pdf.html",
            "beechjet-400-led-cabin": "pwi-beechjet-400-led-cabin-pdf.html",
            "citation-led-cabin": "pwi-citation-led-cabin-pdf.html",
            "citation-led-step-light": "pwi-led-step-light-citation-pdf.html",
            "custom-engineering-services": "pwi-custom-engineering-services-pdf.html",
            "falcon-900b-led-cabin": "pwi-falcon-900b-led-cabin-pdf.html",
            "king-air-90-100-200-led-cabin": "pwi-king-air-90-100-200-b200-250-led-upgrade-pdf.html",
            "king-air-300-led-cabin": "pwi-king-air-300-led-cabin-pdf.html",
            "king-air-ice-light-windows": "pwi-king-air-ice-light-windows-pdf.html",
            "learjet-led-cabin": "pwi-learjet-led-cabin-pdf.html",
            "led-cabin-door-underwing-light": "pwi-led-cabin-door-underwing-light-pdf.html",
            "led-ice-light": "pwi-led-ice-light-pdf.html",
            "led-linear-lights": "pwi-led-linear-lights-pdf.html",
            "led-logo-light": "pwi-led-logo-light-pdf.html",
            "led-reading-lights": "pwi-led-replacement-reading-lights-pdf.html",
            "led-seat-belt-smoking-sign-backlight": "pwi-led-no-smoking-seat-belt-sign-pdf.html",
            "led-wingtip-light-assemblies": "pwi-led-wingtip-light-assembly-pdf.html",
            "no-smoking-seat-belt-sign-graphic": "pwi-no-smoking-seat-belt-sign-graphic-pdf.html",
            "pilatus-pc-12-led-cabin": "pwi-pilatus-pc12-led-cabin-pdf.html"
          };

          return pdfPageBySlug[item.slug] || "";
        }

        function getPdfTarget(item) {
          var pdfPagePath = getPdfPagePath(item);
          if (pdfPagePath) return pdfPagePath;
          if (item.page) return item.page;
          if (item.pdf) return item.pdf;
          return 'product-literature.html?item=' + encodeURIComponent(item.slug);
        }

        function getQrTargetUrl(item) {
          var pdfPagePath = getPdfPagePath(item);
          if (pdfPagePath) return 'https://pwi-e.com/' + pdfPagePath;
          if (item.pdf) return 'https://pwi-e.com/' + encodeURI(item.pdf).replace(/%2F/g, '/');
          return 'https://pwi-e.com/' + (item.page || ('product-literature.html?item=' + encodeURIComponent(item.slug)));
        }

        /* ── Directory ──────────────────────────────────────── */
        function renderDirectory() {
          var entries = Object.keys(window.PWI_QR_DATA || {})
            .map(function (k) { return window.PWI_QR_DATA[k]; })
            .sort(function (a, b) { return a.title.localeCompare(b.title); });

          var cards = entries.map(function (item) {
            var productImage = item.image || 'images/pwi-logo.webp';
            var imageClass   = item.imageClass ? 'product-img ' + item.imageClass : 'product-img';
            var pageUrl      = getPdfTarget(item);
            var isHtmlPage   = pageUrl && !pageUrl.endsWith('.pdf');

            return [
              '<a class="qr-card" href="' + pageUrl + '" style="text-decoration:none;display:block;" aria-label="View product sheet for ' + item.title + '">',
              '  <div class="qr-card-photo" style="height:200px">',
              '    <img class="' + imageClass + '" src="' + productImage + '" alt="' + item.title + '" loading="lazy" decoding="async"/>',
              '    <div class="qr-card-titlebar"><p class="qr-card-name">' + item.title + '</p></div>',
              '  </div>',
              '  <div style="padding:0.75rem 1rem;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #e2e8f0;">',
              '    <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#475569;">Product Sheet</span>',
              '    <span style="font-size:11px;font-weight:600;color:#1e4ed8;display:flex;align-items:center;gap:4px;">',
              isHtmlPage
                ? '      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg> View Page'
                : '      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download PDF',
              '    </span>',
              '  </div>',
              '</a>'
            ].join("");
          }).join("");

          mount.innerHTML = [
            '<p class="text-sm text-muted mb-5">' + entries.length + ' products</p>',
            '<div class="qr-dir-grid">' + cards + '</div>'
          ].join("");
        }

        /* ── Not found ──────────────────────────────────────── */
        function renderUnknown() {
          mount.innerHTML = [
            '<div class="qr-notfound">',
            '  <div class="rounded-2xl border border-line bg-surface p-6 sm:p-8" style="box-shadow:0 4px 16px rgba(15,23,42,0.07)">',
            '    <p class="text-xs font-semibold uppercase tracking-[0.16em] text-[#1E4ED8] mb-3">QR Not Found</p>',
            '    <h2 class="text-2xl font-semibold text-ink mb-3">This QR link needs updating.</h2>',
            '    <p class="text-sm text-muted mb-6">The product mapping for this QR code is missing. Browse the product library or contact PWI for help.</p>',
            '    <div class="flex flex-col sm:flex-row gap-3">',
            '      <a href="pdf-content.html" class="btn-primary inline-flex items-center justify-center rounded-full border px-6 py-3 font-sans text-[11px] uppercase tracking-[0.16em] transition">Browse Product Info</a>',
            '      <a href="contact.html" class="btn-secondary inline-flex items-center justify-center rounded-full border px-6 py-3 font-sans text-[11px] uppercase tracking-[0.16em] transition">Contact PWI</a>',
            '    </div>',
            '  </div>',
            '  <p class="mt-4 text-center text-xs text-muted"><a href="product-literature.html" style="color:inherit;text-decoration:underline">← Back to directory</a></p>',
            '</div>'
          ].join("");
        }

        /* ── Detail ─────────────────────────────────────────── */
        if (!slug)   { renderDirectory(); return; }
        if (!data)   { renderUnknown();   return; }

        var pageUrl      = getPdfTarget(data);
        var isHtmlPage   = pageUrl && !pageUrl.endsWith('.pdf');
        var productImage = data.image || '';

        var photoHtml = productImage
          ? '<div class="qr-detail-photo"><img src="' + productImage + '" alt="' + data.title + '" loading="eager" decoding="async"/></div>'
          : '';

        var ctaLabel = isHtmlPage
          ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg> View Product Sheet'
          : '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download PDF';

        mount.innerHTML = [
          '<div class="qr-detail-wrap">',
          '  <div class="qr-detail-card">',
          photoHtml,
          '    <div class="qr-detail-body">',
          '      <span class="qr-detail-kicker">Product Literature</span>',
          '      <h2 class="qr-detail-title">' + data.title + '</h2>',
          '      <p class="qr-detail-desc">' + data.description + '</p>',
          '      <a href="' + pageUrl + '" style="display:inline-flex;align-items:center;gap:6px;background:#1e4ed8;color:#fff;border-radius:9999px;padding:0.65rem 1.4rem;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;text-decoration:none;">',
          '        ' + ctaLabel,
          '      </a>',
          '    </div>',
          '  </div>',
          '  <a href="product-literature.html" class="qr-back-link">← Back to all products</a>',
          '</div>'
        ].join("");
      })();
    </script>
    <script src="tailwind_theme/shared-layout.min.js?v=20260712langfix" defer></script>
    <script src="tailwind_theme/site-nav.min.js?v=20260710gf1" defer></script>
  </body>
</html>
